name: Release

# Publishes the network-attached skeg-rigging transports to crates.io
# in dependency order: skeg-rigging-net (transport-agnostic types) →
# skeg-rigging-net-http, skeg-rigging-net-resp3. Each step shrugs off
# a 4xx response when the version is already on the index, so re-
# running the workflow against a workspace bump that only touches one
# transport is safe.
#
# Trigger with a `v*` tag (workspace ship) or run manually (dry_run
# defaults to true so a manual invocation verifies the packaging
# without uploading).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip the actual cargo publish (verify only)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo publish skeg-rigging-net
        working-directory: crates/skeg-rigging-net
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --locked
          else
            out=$(cargo publish --locked 2>&1) || \
              echo "$out" | grep -qE 'already (uploaded|exists)' || { echo "$out"; exit 1; }
          fi

      - name: wait for crates.io index propagation
        if: ${{ inputs.dry_run != true }}
        run: sleep 45

      - name: cargo publish skeg-rigging-net-http
        working-directory: crates/skeg-rigging-net-http
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --locked
          else
            out=$(cargo publish --locked 2>&1) || \
              echo "$out" | grep -qE 'already (uploaded|exists)' || { echo "$out"; exit 1; }
          fi

      - name: cargo publish skeg-rigging-net-resp3
        working-directory: crates/skeg-rigging-net-resp3
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cargo publish --dry-run --locked
          else
            out=$(cargo publish --locked 2>&1) || \
              echo "$out" | grep -qE 'already (uploaded|exists)' || { echo "$out"; exit 1; }
          fi
